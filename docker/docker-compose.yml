services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$MINIO_BUCKET
      "

  openldap:
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: Elyzian
      LDAP_DOMAIN: elyzian.local
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_TLS: "false"
    ports:
      - "${LDAP_PORT}:389"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      # Applied in filename order: this one first (fixes the image's default
      # memberOf overlay, which watches groupOfUniqueNames/uniqueMember, to
      # instead watch groupOfNames/member - matching both bootstrap.ldif's
      # groups and real Active Directory's own semantics), then the actual
      # seed data - order matters, since memberOf is computed at write time.
      - ../docker/ldap/memberof-override.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/10-memberof-override.ldif:ro
      - ../docker/ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-bootstrap.ldif:ro
    healthcheck:
      # rootDSE, not our own base DN: that DN doesn't exist yet on a container's
      # very first boot, before the custom bootstrap ldifs above have applied.
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-s", "base", "-b", "", "(objectclass=*)"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Container DNS name, not .env's localhost value (that one's for
      # host-machine tools like `npm run prisma:migrate` run outside Docker).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    command: ["node_modules/.bin/prisma", "migrate", "deploy", "--schema", "apps/api/prisma/schema.prisma"]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      openldap:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api-migrate:
        condition: service_completed_successfully
    environment:
      # Container DNS names for the four networked services, everything else
      # passed through from .env as-is.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      LDAP_URL: ldap://openldap:389
      LDAP_BIND_DN: ${LDAP_BIND_DN}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_USER_SEARCH_BASE: ${LDAP_USER_SEARCH_BASE}
      LDAP_GROUP_SEARCH_BASE: ${LDAP_GROUP_SEARCH_BASE}
      LDAP_USERNAME_ATTRIBUTE: ${LDAP_USERNAME_ATTRIBUTE}
      LDAP_UNIQUE_ID_ATTRIBUTE: ${LDAP_UNIQUE_ID_ATTRIBUTE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      PORT: ${PORT}
      NODE_ENV: production
      # The web container's published host port, not its container DNS name -
      # this is a browser-facing origin, used for the CORS allow-list.
      WEB_ORIGIN: http://localhost:8080
      GLPI_URL: ${GLPI_URL}
      GLPI_APP_TOKEN: ${GLPI_APP_TOKEN}
      GLPI_USER_TOKEN: ${GLPI_USER_TOKEN}
      GLPI_WEBHOOK_SECRET: ${GLPI_WEBHOOK_SECRET}
      GLPI_WEBHOOK_TICKET_ID_FIELD: ${GLPI_WEBHOOK_TICKET_ID_FIELD}
    ports:
      - "${PORT}:${PORT}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # These are consumed by the BROWSER on the host machine, not by
        # another container - hence localhost:<published port>, not the
        # container DNS name `api`. Easy to get backwards.
        VITE_API_URL: http://localhost:${PORT}
        VITE_WS_URL: ws://localhost:${PORT}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # Deliberately not 5173, so this and `npm run dev`'s Vite dev server
      # can run side by side without a port clash.
      - "8080:80"

volumes:
  pg_data:
  redis_data:
  minio_data:
  ldap_data:
  ldap_config:
