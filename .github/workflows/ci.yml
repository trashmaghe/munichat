name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      openldap:
        image: osixia/openldap:1.5.0
        env:
          LDAP_ORGANISATION: MuniChat
          LDAP_DOMAIN: munichat.local
          LDAP_ADMIN_PASSWORD: test
          LDAP_TLS: "false"
          LDAP_ENABLE_MEMBEROF: "true"
        ports:
          - 1389:389
        # rootDSE query (-s base -b ''), not our own base DN: that DN doesn't
        # exist until the ldapadd seed step below runs, so checking it here
        # would report unhealthy forever regardless of whether slapd is up.
        options: >-
          --health-cmd "ldapsearch -x -H ldap://localhost -s base -b '' '(objectclass=*)'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      LDAP_URL: ldap://localhost:1389
      LDAP_BIND_DN: cn=admin,dc=munichat,dc=local
      LDAP_BIND_PASSWORD: test
      LDAP_ADMIN_PASSWORD: test
      LDAP_BASE_DN: dc=munichat,dc=local
      LDAP_USER_SEARCH_BASE: ou=people,dc=munichat,dc=local
      LDAP_GROUP_SEARCH_BASE: ou=groups,dc=munichat,dc=local
      LDAP_USERNAME_ATTRIBUTE: uid
      LDAP_UNIQUE_ID_ATTRIBUTE: entryUUID
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_ACCESS_TTL: "900"
      JWT_REFRESH_TTL: "604800"
      WEB_ORIGIN: http://localhost:5173
      MINIO_ENDPOINT: localhost
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: test_minio_admin
      MINIO_ROOT_PASSWORD: test_minio_password
      MINIO_BUCKET: munichat-files
      GLPI_URL: http://localhost:8080
      GLPI_APP_TOKEN: test-glpi-app-token
      GLPI_USER_TOKEN: test-glpi-user-token

    steps:
      - uses: actions/checkout@v4

      # MinIO isn't declared under `services:` because Actions' service
      # containers only support image/env/ports/volumes/options - there's no
      # way to pass the `server /data` command the image requires. Without
      # it, minio/minio just prints its own CLI help and exits immediately
      # (any tag, not a :latest-specific regression), which is what was
      # failing here. Run it directly instead, with our own readiness wait
      # since it no longer gets the automatic "wait until healthy" gate that
      # `services:` containers get before the job's first step runs.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER="$MINIO_ROOT_USER" \
            -e MINIO_ROOT_PASSWORD="$MINIO_ROOT_PASSWORD" \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              echo "MinIO is up"
              exit 0
            fi
            sleep 2
          done
          echo "::error::MinIO did not become healthy in time"
          docker logs minio
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:shared

      - run: npm run lint --workspaces --if-present

      - run: npm run typecheck --workspaces --if-present

      - run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

      # GitHub Actions service containers can't mount local volumes, so unlike the
      # docker-compose setup (which auto-bootstraps via a mounted LDIF), we seed the
      # directory explicitly here once the openldap service container is healthy.
      - run: sudo apt-get update && sudo apt-get install -y ldap-utils

      - run: |
          ldapadd -x -D "$LDAP_BIND_DN" -w "$LDAP_ADMIN_PASSWORD" -H "$LDAP_URL" -f docker/ldap/bootstrap.ldif

      # TEMPORARY diagnostic: e2e login/channel-sync is failing to find AD
      # group membership on a fresh CI boot. This inspects the LDAP server
      # directly (authenticated, both by explicit attribute name and "+" for
      # all operational attributes) to tell apart "memberof overlay isn't
      # active" from "it's active but not reachable via our app's query
      # shape". Never fails the job - diagnostic only. Remove once resolved.
      - name: Diagnose memberOf
        run: |
          echo "--- ti group's own member: list ---"
          ldapsearch -x -D "$LDAP_BIND_DN" -w "$LDAP_ADMIN_PASSWORD" -H "$LDAP_URL" \
            -b "cn=ti,ou=groups,dc=munichat,dc=local" -s base member || true
          echo "--- jsilva, explicit memberOf ---"
          ldapsearch -x -D "$LDAP_BIND_DN" -w "$LDAP_ADMIN_PASSWORD" -H "$LDAP_URL" \
            -b "uid=jsilva,ou=people,dc=munichat,dc=local" -s base memberOf || true
          echo "--- jsilva, all attrs incl. operational (+) ---"
          ldapsearch -x -D "$LDAP_BIND_DN" -w "$LDAP_ADMIN_PASSWORD" -H "$LDAP_URL" \
            -b "uid=jsilva,ou=people,dc=munichat,dc=local" -s base '*' '+' || true
          echo "--- is the memberof overlay loaded in cn=config? ---"
          ldapsearch -x -D "$LDAP_BIND_DN" -w "$LDAP_ADMIN_PASSWORD" -H "$LDAP_URL" \
            -b "cn=config" '(objectClass=olcMemberOf)' || true

      # Same reasoning as the LDAP seed step above: GitHub Actions service
      # containers can't mount local volumes, so unlike docker-compose's
      # minio-init service, we create the bucket explicitly here once the
      # minio service container is healthy.
      - run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc

      - run: |
          mc alias set local http://localhost:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
          mc mb --ignore-existing "local/$MINIO_BUCKET"

      - run: npm run test --workspaces --if-present

      - run: npm run test:e2e -w apps/api

      - run: npm run build --workspaces --if-present
