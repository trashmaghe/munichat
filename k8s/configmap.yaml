# Non-secret env vars. See secret.example.yaml for the credential half of
# this split, and k8s/README.md for the full rationale and prerequisites.
apiVersion: v1
kind: ConfigMap
metadata:
  name: elyzian-config
  namespace: elyzian
data:
  NODE_ENV: "production"
  PORT: "3000"

  # Browser-facing origin used for the API's CORS allow-list. Replace with
  # the real public URL of the web Deployment/Ingress.
  WEB_ORIGIN: "https://REPLACE_ME.example.com"

  MINIO_ENDPOINT: "REPLACE_ME"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "true"
  MINIO_BUCKET: "elyzian-files"

  GLPI_URL: "https://REPLACE_ME"
  GLPI_WEBHOOK_TICKET_ID_FIELD: "id"

  # External LDAP/Active Directory. LDAP_ADMIN_PASSWORD/LDAP_CONFIG_PASSWORD
  # are deliberately absent - those only bootstrap the local dev OpenLDAP
  # container and have no meaning against a real external directory.
  LDAP_URL: "ldaps://REPLACE_ME:636"
  LDAP_BIND_DN: "REPLACE_ME"
  LDAP_BASE_DN: "REPLACE_ME"
  LDAP_USER_SEARCH_BASE: "REPLACE_ME"
  LDAP_GROUP_SEARCH_BASE: "REPLACE_ME"
  LDAP_USERNAME_ATTRIBUTE: "sAMAccountName"
  LDAP_UNIQUE_ID_ATTRIBUTE: "objectGUID"

  JWT_ACCESS_TTL: "900"
  JWT_REFRESH_TTL: "604800"
